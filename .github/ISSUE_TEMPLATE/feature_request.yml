name: Feature request
description: Propose a new audit check, integration, artifact or quality improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: input
    id: problem
    attributes:
      label: Problem or risk addressed
      placeholder: What gap does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
      description: Explain the audit objective, safe execution and expected output.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence to capture
      description: What would prove pass or failure?
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Expected recommendation behavior
      description: Describe containment, permanent remediation, validation and regression guidance.
  - type: textarea
    id: portability
    attributes:
      label: Agent and platform portability
      description: Note client, operating-system or tool dependencies.
  - type: checkboxes
    id: principles
    attributes:
      label: Design confirmation
      options:
        - label: The proposal is non-destructive by default.
          required: true
        - label: The proposal distinguishes evidence from inference.
          required: true
        - label: The proposal does not claim compliance or certification.
          required: true
